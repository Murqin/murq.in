<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Icarus Murqin</title>
    <script>
        // GitHub Pages serves this for any unknown path.
        // If the path looks like a hex seed (/a3f2c1), redirect to
        // the root with the seed in the hash so index.html can pick it up.
        const segment = window.location.pathname.slice(1).split('/')[0];
        const seed = parseInt(segment, 16);

        if (!isNaN(seed) && seed > 0 && /^[0-9a-f]+$/i.test(segment)) {
            window.location.replace('/#' + segment);
        } else {
            window.location.replace('/');
        }
    </script>
</head>
<body></body>
</html>
